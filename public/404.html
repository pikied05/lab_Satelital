<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Satelital</title>

    <!-- 
      Este script convierte la URL solicitada (que GitHub Pages no encontró)
      en un query string, y redirige a index.html. Ahí, un pequeño script
      lo decodifica y le pasa la ruta correcta a React Router.
      Basado en: https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1; // 1 = mantiene "/lab_Satelital" como base

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
